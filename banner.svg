<svg fill="none" viewBox="0 0 800 200" width="100%" xmlns="http://www.w3.org/2000/svg">
  <rect width="100%" height="100%" rx="8" fill="#010409" stroke="#00d4ff" stroke-width="2"/>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&amp;display=swap');
    .text {
      font-family: 'Share Tech Mono', monospace;
      fill: #00d4ff;
      font-size: 16px;
      opacity: 0;
    }
    .neon-title {
      font-size: 32px;
      fill: #00ff88;
      font-weight: bold;
      filter: drop-shadow(0 0 8px #00ff88);
    }
    .cursor {
      fill: #00d4ff;
      animation: blink 0.8s infinite;
