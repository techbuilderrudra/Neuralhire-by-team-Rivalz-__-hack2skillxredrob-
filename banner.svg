    @keyframes blink { 0%, 100% { opacity: 0; } 50% { opacity: 1; } }
    @keyframes lineShow { to { opacity: 1; } }
    
    .l1 { animation: lineShow 0.1s forwards 0.2s; }
    .l2 { animation: lineShow 0.1s forwards 0.7s; }
    .l3 { animation: lineShow 0.1s forwards 1.2s; }
    .l4 { animation: lineShow 0.1s forwards 1.8s; }
  </style>
  
  <text x="30" y="50" class="text neon-title l1">▲ NEURALHIRE // CORE_ENG_INIT</text>
  <text x="30" y="90" class="text l2">&gt; LOADING GEMINI INTERFACE ENGINE... [ONLINE]</text>
  <text x="30" y="120" class="text l3">&gt; SYNAPSE PIPELINE CONNECTOR... [READY ON PORT 5000]</text>
  <text x="30" y="150" class="text l4">&gt; AWAITING RECRUITER UP-LINK PRIVILEGES</text>
  <rect x="390" y="137" width="10" height="15" class="cursor l4"/>
</svg>
